<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Access</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: white;
            overflow: hidden;
        }

        .orb1,
        .orb2 {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -1;
        }

        .orb1 {
            width: 300px;
            height: 300px;
            background: #4f8ef7;
            top: 10%;
            left: 10%;
        }

        .orb2 {
            width: 300px;
            height: 300px;
            background: #f75fbd;
            bottom: 10%;
            right: 10%;
        }

        .container {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            width: 280px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            border-radius: 10px;
            border: none;
            outline: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        button {
            margin-top: 15px;
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            background: #4f8ef7;
            color: white;
            transition: 0.2s;
        }

        button:hover {
            background: #3a6fd9;
        }
    </style>
</head>

<body>

    <div class="orb1"></div>
    <div class="orb2"></div>

    <div class="container">
        <div class="box">
            <h2>Enter Password</h2>

            <form onsubmit="checkPass(event)">
                <input type="password" id="pass" placeholder="Password">
                <button type="submit">Access</button>
            </form>

            <p id="error" style="color:red; font-size:12px;"></p>
        </div>
    </div>

    <script>
        function checkPass(e) {
            e.preventDefault();

            const pass = document.getElementById("pass").value;

            if (pass === "2010052920110512") {
                window.location.href = "galer2.html";
            } else {
                document.getElementById("error").textContent = "Password salah";
            }
        }
    </script>

</body>

</html>
